<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><style>
.ss-sec{padding:96px 28px;background:#fff;}
.ss-wrap{max-width:1180px;margin:0 auto;}
.ss-head{text-align:center;max-width:840px;margin:0 auto 44px;}
.ss-eyebrow{font-size:14px;font-weight:700;letter-spacing:1px;color:#9A878A;text-transform:uppercase;margin:0 0 14px;}
.ss-eyebrow b{color:#F23F44;font-weight:700;}
.ss-h{font-size:42px;line-height:1.1;font-weight:800;letter-spacing:-1.3px;margin:0 0 14px;color:#1A1014;}
.ss-sub{font-size:17px;line-height:1.6;color:#5A4B4E;margin:0 auto;max-width:600px;}
.ss-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.ss-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;height:158px;background:#fff;border:1px solid #F2E6E7;border-radius:18px;padding:22px;transition:transform .3s cubic-bezier(.2,.7,.3,1),border-color .3s,box-shadow .3s;}
.ss-tile:hover{transform:translateY(-4px);border-color:#FBD0D1;box-shadow:0 16px 34px rgba(110,11,14,.10);}
.ss-tile img{max-height:74px;max-width:108px;object-fit:contain;}
.ss-tile span{font-size:13.5px;font-weight:600;color:#5A4B4E;}
.ss-rise{opacity:0;transform:translateY(26px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.7,.3,1);}
.ss-in .ss-rise{opacity:1;transform:none;}
@media(max-width:760px){.ss-grid{grid-template-columns:repeat(2,1fr);}.ss-h{font-size:32px;}}
@media(prefers-reduced-motion:reduce){.ss-rise{transition:none;opacity:1;transform:none;}}

h1,h2,h3,h4,.h1,.h2,.h3,.hero h1,.eyebrow{text-wrap:balance;}p,li,.body,.lead,.sub,figcaption,blockquote{text-wrap:pretty;}/*om-balance-rule*/
</style></helmet><section class="ss-sec" ref="{{ secRef }}"><div class="ss-wrap"><div class="ss-head"><p class="ss-eyebrow ss-rise">{{ eyebrow }}<b>.</b></p><h2 class="ss-h ss-rise" style="transition-delay:.06s">{{ heading }}</h2><p class="ss-sub ss-rise" style="transition-delay:.12s">{{ sub }}</p></div><div class="ss-grid ss-rise" style="transition-delay:.16s"><div class="ss-tile"><img src="https://testlify.com/wp-content/uploads/2023/03/SOC-2-Type-2.png" alt="SOC 2 Type 2"><span>SOC 2 Type 2</span></div><div class="ss-tile"><img src="https://testlify.com/wp-content/uploads/2023/03/ISO.png" alt="ISO 27001"><span>ISO 27001</span></div><div class="ss-tile"><img src="https://testlify.com/wp-content/uploads/2023/12/logo.svg" alt="EEOC"><span>EEOC-defensible</span></div><div class="ss-tile"><img src="https://testlify.com/wp-content/uploads/2023/03/CCPA.png" alt="CCPA"><span>CCPA</span></div><div class="ss-tile"><img src="https://testlify.com/wp-content/uploads/2023/06/GDPR-1-1.png" alt="GDPR"><span>GDPR</span></div></div></div></section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:520},&quot;eyebrow&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Security &amp; compliance&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;heading&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Built to keep your organization secure&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;sub&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Audited controls, strong data governance and privacy protections — every assessment validated and EEOC-defensible.&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  constructor(props){ super(props); this.secRef = React.createRef(); }
  componentDidMount(){
    const el = this.secRef.current; if(!el) return;
    const check = ()=>{
      const r = el.getBoundingClientRect();
      const vh = window.innerHeight || document.documentElement.clientHeight || 800;
      if(r.top < vh * 0.92 && r.bottom > 0){
        el.classList.add('ss-in');
        window.removeEventListener('scroll', this._rev, true);
        window.removeEventListener('resize', this._rev);
      }
    };
    this._rev = ()=>requestAnimationFrame(check);
    window.addEventListener('scroll', this._rev, true);
    window.addEventListener('resize', this._rev);
    this._rev();
  }
  componentWillUnmount(){
    if(this._rev){ window.removeEventListener('scroll', this._rev, true); window.removeEventListener('resize', this._rev); }
  }
  renderVals(){
    const p = this.props;
    return {
      secRef: this.secRef,
      eyebrow: p.eyebrow ?? 'Security & compliance',
      heading: p.heading ?? 'Built to keep your organization secure',
      sub: p.sub ?? 'Audited controls, strong data governance and privacy protections — every assessment validated and EEOC-defensible.'
    };
  }
}
</script>
</body>
</html>
