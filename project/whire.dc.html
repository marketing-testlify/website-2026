<x-dc>
<dc-import name="customer-success-stories-detail" page-data="{{ pd }}" show-related="{{ showRelated }}" hint-size="100%,100%"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals(){
    return {
      showRelated: true,
      pd: {
        announcement: 'See how Whire hires faster with skills-first screening',
        company: 'Whire',
        industry: 'Recruitment tech',
        headline: 'How Whire built skills-first shortlists and cut screening time in half',
        subhead: 'Whire connects companies with vetted talent. To keep quality high at speed, they moved screening to the front of the funnel with Testlify.',
        metrics: [
          { n: '50%', l: 'less time screening' },
          { n: '2.8\u00d7', l: 'more qualified shortlists' },
          { n: '90%', l: 'assessment completion' }
        ],
        facts: [
          { k: 'Industry', v: 'Recruitment technology' },
          { k: 'Company size', v: '11\u201350 employees' },
          { k: 'Location', v: 'Europe' },
          { k: 'Use case', v: 'Candidate vetting' }
        ],
        products: ['Skill assessments', 'AI resume screener', 'Video interviews'],
        story: [
          { heading: 'The challenge', paras: [
            'Whire\u2019s promise is vetted, ready-to-interview candidates. Delivering that meant a lot of manual screening \u2014 reading r\u00e9sum\u00e9s and running early calls \u2014 which didn\u2019t scale as demand grew.',
            'They needed a way to verify skill objectively and early, without adding headcount or slowing down the teams relying on them.' ] },
          { heading: 'The solution', paras: [
            'Whire put a role-specific Testlify assessment at the very top of the funnel, so every candidate proves ability before a human reviews them.',
            'Recruiters now work from a ranked shortlist with scores and skill breakdowns attached, and add a short async video interview for senior roles.' ] }
        ],
        quote: '\u201CTestlify let us verify skill at the top of the funnel. We deliver better shortlists in half the time \u2014 and our clients trust them.\u201D',
        quoteName: 'Talent Team',
        quoteRole: 'Whire',
        storyAfter: [
          { heading: 'The results', paras: [
            'Screening time dropped by half while the quality of shortlists rose \u2014 2.8\u00d7 more candidates cleared later stages. Completion stayed at 90% thanks to short, candidate-friendly assessments.',
            'Whire scaled its vetting without adding recruiters, and every shortlist now comes with the evidence to back it.' ] }
        ],
        related: [
          { metric: '58% less time-to-hire', company: 'Arch Advisory Group', quote: 'Skills-first screening made every hire defensible.' },
          { metric: '44% lower cost per hire', company: 'Playroll', quote: 'We scaled global hiring without lowering the bar.' },
          { metric: '3.4\u00d7 qualified hires', company: 'Comeet', quote: 'Structured assessment tightened our whole funnel.' }
        ]
      }
    };
  }
}
</script>
