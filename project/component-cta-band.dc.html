<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
.ctaband,.ctaband *{box-sizing:border-box;font-family:'Poppins',sans-serif;}
.ctaband a{text-decoration:none;}
.sfcta{position:relative;overflow:hidden;background:linear-gradient(135deg,#F23F44 0%,#A91E23 60%,#6E0B0E 100%);padding:96px 28px;text-align:center;}
.sfcta-c1{position:absolute;top:-100px;left:-60px;width:340px;height:340px;border-radius:50%;background:rgba(255,255,255,.10);}
.sfcta-c2{position:absolute;bottom:-130px;right:-50px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.08);}
.sfcta-in{position:relative;z-index:2;max-width:1180px;margin:0 auto;}
.sfcta-eyebrow{font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.82);margin:0 0 16px;}
.sfcta-h{font-size:48px;line-height:1.08;font-weight:800;letter-spacing:-1.6px;color:#fff;margin:0 auto;max-width:1010px;}
.sfcta-p{font-size:19px;color:#FFE2E3;margin:20px auto 0;max-width:560px;line-height:1.6;}
.sfcta-btns{display:flex;justify-content:center;flex-wrap:wrap;gap:14px;margin-top:36px;}
.sfcta-b1{display:inline-flex;align-items:center;gap:9px;background:#fff;color:#F23F44;font-weight:700;font-size:17px;padding:16px 32px;border-radius:15px;box-shadow:0 16px 34px rgba(0,0,0,.2);transition:transform .2s ease;}
.sfcta-b1:hover{transform:translateY(-3px);}
.sfcta-b2{display:inline-flex;align-items:center;background:rgba(255,255,255,.14);color:#fff;font-weight:600;font-size:17px;padding:16px 30px;border-radius:15px;border:1.5px solid rgba(255,255,255,.35);transition:background .2s ease;}
.sfcta-b2:hover{background:rgba(255,255,255,.24);}
.sfcta-trust{display:flex;justify-content:center;flex-wrap:wrap;gap:26px;margin-top:30px;color:#FFD2D3;font-size:14.5px;font-weight:500;}
@media(max-width:600px){.sfcta{padding:64px 22px;}.sfcta-h{font-size:34px;}}

h1,h2,h3,h4,.h1,.h2,.h3,.hero h1,.eyebrow{text-wrap:balance;}p,li,.body,.lead,.sub,figcaption,blockquote{text-wrap:pretty;}/*om-balance-rule*/
</style>
</helmet>
<section class="ctaband"><div class="sfcta">
  <div class="sfcta-c1"></div>
  <div class="sfcta-c2"></div>
  <div class="sfcta-in">
    <p class="sfcta-eyebrow">{{ eyebrow }}<span style="color:#fff;">.</span></p>
    <h2 class="sfcta-h">{{ heading }}</h2>
    <p class="sfcta-p">{{ sub }}</p>
    <div class="sfcta-btns">
      <a href="{{ b1href }}" class="sfcta-b1">{{ b1label }}<span>→</span></a>
      <sc-if value="{{ hasB2 }}" hint-placeholder-val="{{ true }}"><a href="{{ b2href }}" class="sfcta-b2">{{ b2label }}</a></sc-if>
    </div>
    <div class="sfcta-trust"><span>✓ Full feature access</span><span>✓ No credit card required</span><span>✓ Cancel anytime</span></div>
  </div>
</div></section>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:480},&quot;eyebrow&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Start hiring on skill&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;heading&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Your next great hire is already in your pipeline&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;sub&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Build your first assessment in about two minutes and start surfacing proven talent today — free for 7 days.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;b1label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Try for free&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;b1href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;pricing.dc.html&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;b2label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Book a demo&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;b2href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;contact.dc.html&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;hideSecondary&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals(){
    return {
      eyebrow: this.props.eyebrow || 'Start hiring on skill',
      heading: this.props.heading || 'Your next great hire is already in your pipeline',
      sub: this.props.sub || 'Build your first assessment in about two minutes and start surfacing proven talent today — free for 7 days.',
      b1label: this.props.b1label || 'Try for free', b1href: this.props.b1href || 'pricing.dc.html',
      b2label: this.props.b2label || 'Book a demo', b2href: this.props.b2href || 'contact.dc.html',
      hasB2: this.props.hideSecondary ? false : true
    };
  }
}
</script>
</body>
</html>
