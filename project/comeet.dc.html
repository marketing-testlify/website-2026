  renderVals(){
    return {
      showRelated: true,
      pd: {
        announcement: 'See how Comeet tightened its hiring funnel',
        company: 'Comeet',
        industry: 'Recruiting software',
        headline: 'How Comeet tightened its funnel with structured assessment',
