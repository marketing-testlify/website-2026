<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./site-base.css">
<script src="./reveal.js"></script>
<style>
.dlcard{background:#fff;border:1px solid #F0E2E3;border-radius:22px;padding:40px;box-shadow:0 20px 44px rgba(110,11,14,.08);}
.dlfield{margin-bottom:18px;}
.dlfield label{display:block;font-size:13.5px;font-weight:700;color:#1A1014;margin-bottom:8px;}
.dlinput{width:100%;height:50px;border:1.5px solid #EADDDE;border-radius:12px;padding:0 16px;font-family:inherit;font-size:15px;font-weight:500;color:#1A1014;background:#FCFAFA;}
.dlinput:focus{outline:none;border-color:#F23F44;box-shadow:0 0 0 4px rgba(242,63,68,.12);background:#fff;}
.dlbtn{width:100%;height:52px;border:none;border-radius:13px;background:#F23F44;color:#fff;font-family:inherit;font-weight:700;font-size:15.5px;cursor:pointer;box-shadow:0 12px 26px rgba(242,63,68,.30);transition:transform .25s,box-shadow .25s;}
.dlbtn:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(242,63,68,.40);}
.dlok{background:#FFF0EF;border:1px solid #FCE0DE;border-radius:14px;padding:18px 20px;color:#A91E23;font-weight:600;font-size:14.5px;}
</style>
</helmet>
<dc-import name="component-site-header" announcement="Download a sample personality report" announcement-cta="Try for free" home-href="core-home.dc.html" hint-size="100%,110px"></dc-import>

<section class="phero"><div class="wrap" style="max-width:860px;">
  <p class="eyebrow reveal">Download the report<b>.</b></p>
  <h1 class="h1 reveal" style="transition-delay:.04s">Get the sample report</h1>
  <p class="lead reveal" style="margin:22px auto 0;max-width:620px;transition-delay:.08s">See exactly what a completed Smart Personality Assessment report looks like. Tell us where to send it.</p>
</div></section>

<section class="sec" style="padding-top:20px;"><div class="wrap" style="max-width:520px;">
  <div class="dlcard reveal">
    <sc-if value="{{ sent }}" hint-placeholder-val="{{ false }}">
      <div class="dlok">Thanks! Your sample report is on its way to your inbox.</div>
    </sc-if>
    <sc-if value="{{ notSent }}" hint-placeholder-val="{{ true }}">
      <div class="dlfield"><label>Full name</label><input class="dlinput" type="text" value="{{ name }}" onInput="{{ onName }}"></div>
      <div class="dlfield"><label>Work email</label><input class="dlinput" type="email" value="{{ email }}" onInput="{{ onEmail }}"></div>
      <div class="dlfield" style="margin-bottom:22px;"><label>Company</label><input class="dlinput" type="text" value="{{ company }}" onInput="{{ onCompany }}"></div>
      <button class="dlbtn" onClick="{{ onSubmit }}">Send me the report</button>
    </sc-if>
  </div>
</div></section>

<dc-import name="component-cta-band" hint-size="100%,520px"></dc-import>
<dc-import name="component-site-footer" home-href="core-home.dc.html" hint-size="100%,560px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { name:'', email:'', company:'', sent:false };
  renderVals(){
    return {
      name:this.state.name, email:this.state.email, company:this.state.company,
      sent:this.state.sent, notSent:!this.state.sent,
      onName:(e)=>this.setState({name:e.target.value}),
      onEmail:(e)=>this.setState({email:e.target.value}),
      onCompany:(e)=>this.setState({company:e.target.value}),
      onSubmit:()=>{ if(this.state.email && this.state.email.indexOf('@')>0) this.setState({sent:true}); }
    };
  }
}
</script>
</body>
</html>
