<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
.ctabtn{position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:9px;font-family:'Poppins',sans-serif;font-weight:600;text-decoration:none;cursor:pointer;border:0;white-space:nowrap;}
.ctabtn.sz-lg{font-size:17px;padding:16px 30px;border-radius:15px;}
.ctabtn.sz-md{font-size:16px;padding:14px 26px;border-radius:14px;}
.ctabtn.sz-sm{font-size:14.5px;padding:11px 20px;border-radius:12px;}
.ctabtn.v-primary{background:#F23F44;color:#fff;box-shadow:0 14px 30px rgba(242,63,68,.35);transition:transform .18s cubic-bezier(.2,.7,.3,1),box-shadow .25s ease;}
.ctabtn.v-primary::after{content:"";position:absolute;top:0;left:0;width:38%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);transform:translateX(-130%) skewX(-18deg);pointer-events:none;}
.ctabtn.v-primary:hover{transform:translateY(-2px);box-shadow:0 20px 40px rgba(242,63,68,.45);}
.ctabtn.v-primary:hover::after{animation:ctashine 1.05s ease;}
.ctabtn.v-secondary{background:#fff;color:#1A1014;border:1.5px solid #F0D9DA;transition:transform .25s ease,border-color .25s ease;}
.ctabtn.v-secondary:hover{transform:translateY(-3px);border-color:#F23F44;}
.ctabtn.v-light{background:#fff;color:#C0242B;transition:transform .18s cubic-bezier(.2,.7,.3,1),box-shadow .25s ease;box-shadow:0 12px 28px rgba(0,0,0,.18);}
.ctabtn.v-light::after{content:"";position:absolute;top:0;left:0;width:38%;height:100%;background:linear-gradient(100deg,transparent,rgba(242,63,68,.18),transparent);transform:translateX(-130%) skewX(-18deg);pointer-events:none;}
.ctabtn.v-light:hover{transform:translateY(-2px);box-shadow:0 18px 38px rgba(0,0,0,.24);}
.ctabtn.v-light:hover::after{animation:ctashine 1.05s ease;}
.ctabtn.v-outline-light{background:rgba(255,255,255,.14);color:#fff;border:1.5px solid rgba(255,255,255,.4);transition:transform .25s ease,background .25s ease,border-color .25s ease;}
.ctabtn.v-outline-light:hover{transform:translateY(-3px);background:rgba(255,255,255,.22);border-color:#fff;}
.ctabtn .cta-arrow{font-size:19px;line-height:1;}
.ctabtn .cta-play{width:30px;height:30px;border-radius:50%;background:#FFF0F0;display:inline-flex;align-items:center;justify-content:center;color:#F23F44;}
.ctabtn .cta-play svg{display:block;margin-left:1px;}
@keyframes ctashine{0%{transform:translateX(-130%) skewX(-18deg)}55%,100%{transform:translateX(260%) skewX(-18deg)}}
</style>
</helmet>
<a class="ctabtn v-{{ variant }} sz-{{ size }}" href="{{ href }}" ref="{{ btnRef }}">
  <sc-if value="{{ isPlay }}" hint-placeholder-val="{{ false }}"><span class="cta-play"><svg width="9" height="11" viewBox="0 0 9 11" fill="currentColor"><path d="M0 0.6v9.8l9-4.9z"></path></svg></span></sc-if>
  {{ label }}
  <sc-if value="{{ isArrow }}" hint-placeholder-val="{{ true }}"><span class="cta-arrow">→</span></sc-if>
</a>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:80},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Try for free&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;primary&quot;,&quot;options&quot;:[&quot;primary&quot;,&quot;secondary&quot;,&quot;light&quot;,&quot;outline-light&quot;],&quot;tsType&quot;:&quot;'primary'|'secondary'|'light'|'outline-light'&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;lg&quot;,&quot;options&quot;:[&quot;lg&quot;,&quot;md&quot;,&quot;sm&quot;],&quot;tsType&quot;:&quot;'lg'|'md'|'sm'&quot;},&quot;icon&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;arrow&quot;,&quot;options&quot;:[&quot;arrow&quot;,&quot;play&quot;,&quot;none&quot;],&quot;tsType&quot;:&quot;'arrow'|'play'|'none'&quot;},&quot;magnetic&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  btnRef = React.createRef();

  componentDidMount() {
    const btn = this.btnRef.current;
    const mag = this.props.magnetic === true || this.props.magnetic === 'true';
    if (!btn || !mag) return;
    const strength = 0.32, lift = -3;
    this._enter = () => {
      btn.style.transition = 'transform .2s cubic-bezier(.2,.7,.3,1), box-shadow .25s ease';
      btn.style.transform = 'translate(0px,' + lift + 'px)';
    };
    this._move = (e) => {
      btn.style.transition = 'transform .08s linear, box-shadow .25s ease';
      const r = btn.getBoundingClientRect();
      const x = (e.clientX - (r.left + r.width / 2)) * strength;
      const y = (e.clientY - (r.top + r.height / 2)) * strength + lift;
      btn.style.transform = 'translate(' + x.toFixed(1) + 'px,' + y.toFixed(1) + 'px)';
    };
    this._leave = () => { btn.style.transition = 'transform .25s cubic-bezier(.2,.7,.3,1), box-shadow .25s ease'; btn.style.transform = ''; };
    btn.addEventListener('mouseenter', this._enter);
    btn.addEventListener('mousemove', this._move);
    btn.addEventListener('mouseleave', this._leave);
  }

  componentWillUnmount() {
    const btn = this.btnRef.current;
    if (btn) { btn.removeEventListener('mouseenter', this._enter); btn.removeEventListener('mousemove', this._move); btn.removeEventListener('mouseleave', this._leave); }
  }

  renderVals() {
    const icon = this.props.icon || (this.props.variant === 'secondary' ? 'none' : 'arrow');
    return {
      btnRef: this.btnRef,
      label: this.props.label ?? 'Try for free',
      href: this.props.href ?? '#',
      variant: this.props.variant || 'primary',
      size: this.props.size || 'lg',
      isArrow: icon === 'arrow',
      isPlay: icon === 'play',
    };
  }
}
</script>
</body>
</html>
