class Component extends DCLogic {
  renderVals(){
    return {
      showRelated: true,
      pd: {
        announcement: 'See how Udder hires quality talent at speed',
        company: 'Udder',
        industry: 'Technology',
        headline: 'How Udder scaled hiring without lowering the bar',
        subhead: 'A fast-growing tech team needed to hire quickly while keeping quality high. Testlify let them screen on verified skill from day one.',
        metrics: [
          { n: '61%', l: 'faster shortlisting' },
          { n: '3\u00d7', l: 'qualified candidates per role' },
          { n: '93%', l: 'assessment completion' }

        facts: [
          { k: 'Industry', v: 'Technology' },
          { k: 'Company size', v: '11\u201350 employees' },
          { k: 'Location', v: 'Remote-first' },
          { k: 'Use case', v: 'Technical hiring' }

        products: ['Skill assessments', 'Coding tests', 'Video interviews'],
        story: [
          { heading: 'The challenge', paras: [
            'Udder was hiring engineers faster than its small team could screen. R\u00e9sum\u00e9 review missed strong self-taught candidates and let polished-but-weak ones through.',
            'They wanted an objective way to see who could actually do the work \u2014 before spending engineering time on interviews.' ] },
          { heading: 'The solution', paras: [
            'Udder added Testlify coding and role-specific tests at the start of the process, with anti-cheat proctoring for confidence in the results.',
            'Only candidates who passed the skills bar reached a live interview, so engineers spent time only on the strongest applicants.' ] }
        ],
        quote: '\u201CWe stopped guessing from r\u00e9sum\u00e9s. Testlify shows us who can do the job, so our engineers only interview people worth their time.\u201D',
        quoteName: 'Engineering Team',
        quoteRole: 'Udder',

        ],
        related: [
          { metric: '58% less time-to-hire', company: 'Arch Advisory Group', quote: 'Skills-first screening made every hire defensible.' },
